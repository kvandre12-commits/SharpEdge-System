name: Ingest SPY data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false

    env:
      SPY_DB_PATH: data/spy_truth.db
      SYMBOL: SPY
      INTRADAY_TIMEFRAME: "15Min"
      INTRADAY_BARS_TABLE: spy_bars_15m

      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_TIMEOUT: 120
      ALPACA_RETRIES: 6
      ALPACA_FAIL_OPEN: 1
      FINRA_CLIENT_ID: ${{ secrets.FINRA_CLIENT_ID }}
      FINRA_CLIENT_SECRET: ${{ secrets.FINRA_CLIENT_SECRET }}

      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
         python-version: "3.11"

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install pandas numpy matplotlib yfinance

      - name: Initialize pipeline health
        run: |
          mkdir -p outputs/health
          echo "pipeline_start=$(date -u)" > outputs/health/run_state.txt
      
      - name: Ingest options chain snapshots (Alpaca)
        continue-on-error: true
        run: |
          python scripts/ingest_alpaca_options_chain_snapshots.py || echo "WARN: options snapshot ingest degraded" >> outputs/health/warnings.log
     
      - name: Ingest options open interest (contracts)
        continue-on-error: true
        run: python scripts/ingest_alpaca_options_open_interest_daily.py
     
      - name: Aggregate options positioning metrics (0-1 DTE)
        continue-on-error: true
        run: |
          DTE_MIN=0 DTE_MAX=1 python scripts/aggregate_options_positioning_metrics.py

      - name: Aggregate options positioning metrics (2-3 DTE)
        continue-on-error: true
        run: |
          DTE_MIN=2 DTE_MAX=3 python scripts/aggregate_options_positioning_metrics.py

      - name: Build options surface state
        continue-on-error: true
        run: |
          python scripts/build_options_surface_state.py

      - name: Show options surface state
        continue-on-error: true
        run: |
          cat outputs/options_surface_state.txt || true
      
      - name: Debug OI walls (latest)
        continue-on-error: true
        run: |
          python - <<'PY'
          import sqlite3, os, pandas as pd
          db = os.getenv("SPY_DB_PATH","data/spy_truth.db")
          con = sqlite3.connect(db)
          q = """
          SELECT session_date, underlying, spot,
           max_total_oi_strike, max_call_oi_strike, max_put_oi_strike,
           gamma_wall_strike, gamma_flip_strike,
           total_call_oi, total_put_oi, pcr_oi
          FROM options_positioning_metrics
          WHERE underlying='SPY'
          ORDER BY session_date DESC, snapshot_ts DESC
          LIMIT 10
          """
          df = pd.read_sql_query(q, con)
          print(df.to_string(index=False))
          PY
      # -----------------------------
      # DAILY BARS
      # -----------------------------
      - name: Ingest SPY daily bars
        run: |
          python scripts/ingest_spy_daily.py

      - name: Post surface execution card to Discord
        continue-on-error: true
        run: |
          python scripts/utils/post_surface_execution_card_to_discord.py || echo "WARN: surface execution Discord failed" >> outputs/health/warnings.log

      - name: FINRA darkpool overlay
        continue-on-error: true
        run: |
          if [ -z "$FINRA_CLIENT_ID" ] || [ -z "$FINRA_CLIENT_SECRET" ]; then
            echo "FINRA creds missing — skipping FINRA overlay"
            exit 0
          fi
          python scripts/ingest_finra_darkpool_overlay.py || echo "WARN: FINRA overlay degraded" >> outputs/health/warnings.log

      - name: FRED macro overlays
        continue-on-error: true
        run: |
          if [ -z "$FRED_API_KEY" ]; then
            echo "FRED_API_KEY missing — skipping FRED overlays"
            exit 0
          fi
          python scripts/ingest_fred_overlays.py || echo "WARN: FRED overlay degraded" >> outputs/health/warnings.log

      - name: Post FINAL trade card to Discord
        if: steps.controller.outputs.decision == 'post'
        continue-on-error: true
        run: |
          python scripts/send_trade_card_to_discord.py || echo "WARN: final Discord trade card failed" >> outputs/health/warnings.log

      - name: Commit updated DB + outputs
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ outputs/ sql/ scripts/ || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily pipeline + regimes + signals + proof-of-edge artifacts" || true
          git push || true

      - name: Final pipeline state
        if: always()
        run: |
          echo "PIPELINE COMPLETE"
          if [ -f outputs/health/warnings.log ]; then
            echo "WARNINGS DETECTED:"
            cat outputs/health/warnings.log
          else
            echo "NO WARNINGS"
          fi
